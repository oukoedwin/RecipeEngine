      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
  /api/v1/recipes/recipes/{id}/made/:
    get:
      operationId: recipes_recipes_made_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
    post:
      operationId: recipes_recipes_made_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
  /api/v1/recipes/recipes/popular/:
    get:
      operationId: recipes_recipes_popular_retrieve
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeList'
          description: ''
  /api/v1/recipes/vocabulary/:
    get:
      operationId: recipes_vocabulary_retrieve
      description: |-
        The fixed ingredient/cooking-tech/dietary-tag vocabularies, so a client builds
        its pickers from the server's list instead of hardcoding a copy that can drift.
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vocabulary'
          description: ''
  /api/v1/social/dishes/{id}/claim/:
    post:
      operationId: social_dishes_claim_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - social
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishClaimResponse'
          description: ''
  /api/v1/social/events/:
    get:
      operationId: social_events_list
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      tags:
      - social
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DinnerEvent'
          description: ''
    post:
      operationId: social_events_create
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      tags:
      - social
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DinnerEvent'
          description: ''
  /api/v1/social/events/{id}/:
    get:
      operationId: social_events_retrieve
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dinner event.
        required: true
      tags:
      - social
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DinnerEvent'
          description: ''
  /api/v1/social/events/{id}/ics/:
    get:
      operationId: social_events_ics_retrieve
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dinner event.
        required: true
      tags:
      - social
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DinnerEvent'
          description: ''
  /api/v1/social/events/{id}/respond/:
    post:
      operationId: social_events_respond_create
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dinner event.
        required: true
      tags:
      - social
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DinnerEvent'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DinnerEvent'
          description: ''
  /api/v1/social/events/invited/:
    get:
      operationId: social_events_invited_retrieve
      description: List/create/retrieve only — the web app has no event edit/delete
        view either.
      tags:
      - social
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DinnerEvent'
