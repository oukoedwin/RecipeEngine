components:
  schemas:
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    CookingTechnologiesEnum:
      enum:
      - Oven
      - Grill
      - Microwave
      type: string
      description: |-
        * `Oven` - Oven
        * `Grill` - Grill
        * `Microwave` - Microwave
    DietaryTagsEnum:
      enum:
      - Vegetarian
      - Vegan
      - Gluten-Free
      - Dairy-Free
      - Nut-Free
      - Halal
      - Kosher
      type: string
      description: |-
        * `Vegetarian` - Vegetarian
        * `Vegan` - Vegan
        * `Gluten-Free` - Gluten-Free
        * `Dairy-Free` - Dairy-Free
        * `Nut-Free` - Nut-Free
        * `Halal` - Halal
        * `Kosher` - Kosher
    DinnerEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        host:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        title:
          type: string
          maxLength: 200
        date:
          type: string
          format: date
        time:
          type: string
          format: time
        location:
          type: string
          maxLength: 255
        dishes:
          type: array
          items:
            $ref: '#/components/schemas/EventDish'
          readOnly: true
        accepted_guests:
          type: array
          items:
            $ref: '#/components/schemas/User'
          readOnly: true
        user_invite:
          allOf:
          - $ref: '#/components/schemas/EventInvite'
          nullable: true
          readOnly: true
        recipe_ids:
          type: array
          items:
            type: integer
          writeOnly: true
        recipient_ids:
          type: array
          items:
            type: integer
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accepted_guests
      - created_at
      - date
      - dishes
      - host
      - id
      - time
      - title
      - user_invite
    DishClaimResponse:
      type: object
      description: Schema-only — describes EventDishClaimView's response shape.
      properties:
        claimed:
          type: boolean
      required:
      - claimed
    EventDish:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        recipe:
          allOf:
          - $ref: '#/components/schemas/RecipeList'
          readOnly: true
        claimed_by:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
      required:
      - claimed_by
      - id
      - recipe
    EventInvite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        recipient:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        responded_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - id
      - recipient
      - responded_at
      - status
    FriendUsername:
      type: object
      properties:
        username:
          type: string
      required:
      - username
    Friendship:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        friend:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - friend
      - id
    IngredientsEnum:
      enum:
      - Chicken
      - Beef
      - Pork
      - Fish
      - Shrimp
      - Rice
      - Pasta
      - Potato
      - Bread
      - Tortilla
      - Egg
      - Cheese
      - Milk
      - Butter
      - Olive Oil
      - Tomato
      - Onion
      - Garlic
      - Bell Pepper
      - Spinach
      type: string
      description: |-
        * `Chicken` - Chicken
        * `Beef` - Beef
        * `Pork` - Pork
        * `Fish` - Fish
        * `Shrimp` - Shrimp
        * `Rice` - Rice
        * `Pasta` - Pasta
        * `Potato` - Potato
        * `Bread` - Bread
        * `Tortilla` - Tortilla
        * `Egg` - Egg
        * `Cheese` - Cheese
        * `Milk` - Milk
        * `Butter` - Butter
        * `Olive Oil` - Olive Oil
        * `Tomato` - Tomato
        * `Onion` - Onion
        * `Garlic` - Garlic
        * `Bell Pepper` - Bell Pepper
        * `Spinach` - Spinach
    PatchedRecipeDetail:
      type: object
      description: Lightweight shape used for list/search results and nested "similar
        recipes".
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        creator:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        servings:
          type: integer
          maximum: 2147483647
          minimum: 0
        time_minutes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientsEnum'
        cooking_technologies:
          type: array
          items:
            $ref: '#/components/schemas/CookingTechnologiesEnum'
        dietary_tags:
          type: array
          items:
            $ref: '#/components/schemas/DietaryTagsEnum'
        picture:
          type: string
          format: uri
          nullable: true
        like_count:
          type: integer
          readOnly: true
        missing_ingredients:
          type: array
          items:
            type: string
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        instructions:
          type: string
        user_has_liked:
          type: boolean
          readOnly: true
        similar_recipes:
          type: array
          items:
            $ref: '#/components/schemas/RecipeList'
          readOnly: true
        comments:
          type: array
          items:
            $ref: '#/components/schemas/RecipeComment'
