openapi: 3.0.3
info:
  title: RecipeEngine API
  version: 1.0.0
  description: API for the RecipeEngine recipe-sharing and dinner-coordination app.
paths:
  /api/v1/accounts/friends/:
    get:
      operationId: accounts_friends_list
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Friendship'
          description: ''
  /api/v1/accounts/friends/{id}/remove/:
    delete:
      operationId: accounts_friends_remove_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/accounts/friends/add/:
    post:
      operationId: accounts_friends_add_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendUsername'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FriendUsername'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FriendUsername'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friendship'
          description: ''
  /api/v1/accounts/register/:
    post:
      operationId: accounts_register_create
      description: |-
        POST username/password -> creates the user and returns an auth token.
        (The web `register` view calls `login()` for a session instead — see
        apps/accounts/services.py for why that isn't a shared service method.)
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      tags:
      - auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/v1/recipes/collections/:
    get:
      operationId: recipes_collections_list
      description: |-
        List/create/retrieve only — the web app has no collection rename/delete view,
        so the API doesn't expose one either (see collection_toggle_recipe for the one
        mutation collections do support).
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeCollection'
          description: ''
    post:
      operationId: recipes_collections_create
      description: |-
        List/create/retrieve only — the web app has no collection rename/delete view,
        so the API doesn't expose one either (see collection_toggle_recipe for the one
        mutation collections do support).
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeCollection'
          description: ''
  /api/v1/recipes/collections/{id}/:
    get:
      operationId: recipes_collections_retrieve
      description: |-
        List/create/retrieve only — the web app has no collection rename/delete view,
        so the API doesn't expose one either (see collection_toggle_recipe for the one
        mutation collections do support).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe collection.
        required: true
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeCollection'
          description: ''
  /api/v1/recipes/collections/{id}/toggle_recipe/:
    post:
      operationId: recipes_collections_toggle_recipe_create
      description: |-
        List/create/retrieve only — the web app has no collection rename/delete view,
        so the API doesn't expose one either (see collection_toggle_recipe for the one
        mutation collections do support).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe collection.
        required: true
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeCollection'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeCollection'
          description: ''
  /api/v1/recipes/recipes/:
    get:
      operationId: recipes_recipes_list
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeList'
          description: ''
    post:
      operationId: recipes_recipes_create
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
  /api/v1/recipes/recipes/{id}/:
    get:
      operationId: recipes_recipes_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
    put:
      operationId: recipes_recipes_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
    patch:
      operationId: recipes_recipes_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRecipeDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRecipeDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRecipeDetail'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
    delete:
      operationId: recipes_recipes_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/recipes/recipes/{id}/comments/:
    get:
      operationId: recipes_recipes_comments_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
          description: ''
    post:
      operationId: recipes_recipes_comments_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
