<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Recipe App{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'recipe_list' %}">Recipes</a>
        {% if user.is_authenticated %}
            <a href="{% url 'recipe_create' %}">Create Recipe</a>
            <a href="{% url 'collection_list' %}">Collections</a>
            <a href="{% url 'event_list' %}">Dinners</a>
            <a href="{% url 'friend_list' %}">Friends</a>
            <span>{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
    <hr>
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
