{% extends 'base.html' %}

{% block content %}
<h1>I made "{{ recipe.title }}"</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Post</button>
</form>

<p><a href="{% url 'recipe_detail' recipe.pk %}">Cancel</a></p>
{% endblock %}
